<!DOCTYPE html>
<html lang="en" data-theme="ocean">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Details — KATCHCON</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="page-backdrop" class="page-backdrop"></div>
<nav id="navbar" class="navbar"></nav>
<div id="mobile-menu" class="mobile-menu"></div>

<main>
  <section style="padding-top:160px;">
    <div class="container" id="detail-mount"></div>
  </section>
</main>

<footer id="footer"></footer>

<script src="js/icons.js"></script>
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/theme.js"></script>
<script src="js/main.js"></script>
<script>
  window.ACTIVE_PAGE = "services";
  document.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");
    let index = SERVICES.findIndex(s => s.slug === slug);
    if (index === -1) index = 0;
    const service = SERVICES[index];
    const prev = SERVICES[(index - 1 + SERVICES.length) % SERVICES.length];
    const next = SERVICES[(index + 1) % SERVICES.length];

    document.title = service.title + " — KATCHCON";

    const mount = document.getElementById("detail-mount");
    mount.innerHTML = `
      <a href="services.html" class="back-link">${icon('chevronLeft',18)} All Services</a>

      <div class="detail-hero">
        <div>
          <div class="title-row"><div class="icon-box">${icon(service.icon, 24)}</div><h1 style="font-size:32px;font-weight:900;">${service.title}</h1></div>
          <p class="desc" style="margin-top:16px;">${service.short}</p>
        </div>
        <div class="bubble-wrap" style="width:360px;height:360px;margin:0 auto;">
          <div class="bubble-glow"></div>
          <div class="bubble-morph"><img src="${service.image}" alt="${service.title}"></div>
        </div>
      </div>

      <div class="grid grid-2">
        <div>
          <h2 class="h2-section">Service Overview</h2>
          <p class="desc" style="margin-bottom:24px;">${service.overview}</p>
          <ul class="checklist">
            ${service.highlights.map(h => `<li><span class="check-badge">${icon('check',14)}</span><span>${h}</span></li>`).join("")}
          </ul>
        </div>
        <div class="cap-card">
          <h3 style="font-size:18px;font-weight:900;margin-bottom:16px;">Capabilities</h3>
          <ul class="cap-num-list">
            ${service.capabilities.map(c => `<li><span class="cap-dot"></span>${c}</li>`).join("")}
          </ul>
        </div>
      </div>

      <div class="prevnext">
        <a href="service-detail.html?slug=${prev.slug}">
          <span class="pn-cap caption">${icon('chevronLeft',14)} Previous</span>
          <strong>${prev.title}</strong>
        </a>
        <a href="service-detail.html?slug=${next.slug}" class="next-link">
          <span class="pn-cap caption">Next ${icon('chevronRight',14)}</span>
          <strong>${next.title}</strong>
        </a>
      </div>

      <section>
        <div class="grid grid-2" style="gap:24px; margin-top:40px;">
          <div class="cta-card">
            <div class="cta-card-body">
              <div class="cta-card-top">
                <div class="icon-box">${icon('mail',20)}</div>
                <div>
                  <span class="pill-badge amber">Contact Support</span>
                  <h3>Speak with a project specialist</h3>
                </div>
              </div>
              <p>Need a tailored implementation, feasibility check, or technical review? Our team can respond with a proposal aligned to your timeline.</p>
              <div class="cta-card-actions">
                <a href="contact.html" class="btn btn-amber">Book a Consultation &rarr;</a>
              </div>
            </div>
          </div>

          <div class="cta-card">
            <div class="cta-card-body">
              <div class="cta-card-top amber">
                <div class="icon-box">${icon('briefcase',20)}</div>
                <div>
                  <span class="pill-badge">Explore Services</span>
                  <h3>See more ways we can help</h3>
                </div>
              </div>
              <p>Browse our full services portfolio and identify the solution package that best fits your energy, transmission, or storage challenge.</p>
              <div class="cta-card-actions">
                <a href="services.html" class="btn btn-outline-white">View All Services</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    `;
  });
</script>
</body>
</html>
